<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NOVA — Hinglish AI Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a26;
      --accent: #7c3aed;
      --accent2: #a855f7;
      --glow: #7c3aed44;
      --text: #f0eeff;
      --muted: #7b7a99;
      --border: #2a2a3d;
      --user-bg: #1e1040;
      --bot-bg: #111118;
      --font: 'Syne', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Animated bg */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 20% 20%, #7c3aed18 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 80%, #a855f712 0%, transparent 50%);
      animation: bgPulse 8s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes bgPulse {
      0% { transform: scale(1) rotate(0deg); opacity: 0.6; }
      100% { transform: scale(1.1) rotate(3deg); opacity: 1; }
    }

    /* Header */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      backdrop-filter: blur(12px);
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 16px;
      color: white;
      box-shadow: 0 0 20px var(--glow);
      flex-shrink: 0;
    }

    .header-info h1 {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .header-info p {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e88;
      animation: pulse 2s infinite;
      margin-left: auto;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Chat area */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      z-index: 1;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Messages */
    .msg {
      display: flex;
      gap: 12px;
      animation: msgIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
      transform: translateY(12px);
    }

    @keyframes msgIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
    }

    .avatar.bot {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 12px var(--glow);
    }

    .avatar.user-av {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--accent2);
    }

    .bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.6;
    }

    .msg.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid #3b1d6e;
      border-radius: 16px 4px 16px 16px;
      color: #e0d4ff;
    }

    .bubble .label {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* Typing indicator */
    .typing-bubble {
      display: flex;
      gap: 5px;
      padding: 14px 18px;
      align-items: center;
    }

    .typing-bubble span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent2);
      animation: bounce 1.2s infinite;
    }

    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Input area */
    footer {
      position: relative;
      z-index: 10;
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .input-wrap {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    #userInput {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      resize: none;
      min-height: 24px;
      max-height: 120px;
      line-height: 1.5;
    }

    #userInput::placeholder { color: var(--muted); }

    #sendBtn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 12px var(--glow);
    }

    #sendBtn:hover { transform: scale(1.08); box-shadow: 0 0 20px var(--glow); }
    #sendBtn:active { transform: scale(0.95); }
    #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    #sendBtn svg { width: 18px; height: 18px; }

    .hint {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      font-family: var(--mono);
    }

    /* Suggestions */
    .suggestions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .suggestion-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font);
    }

    .suggestion-chip:hover {
      border-color: var(--accent);
      color: var(--accent2);
      background: #1a0a3a;
    }

    /* Welcome */
    .welcome {
      text-align: center;
      padding: 32px 0 8px;
      animation: msgIn 0.5s ease forwards;
    }

    .welcome h2 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .welcome p {
      color: var(--muted);
      font-size: 14px;
      font-family: var(--mono);
    }
  </style>
</head>
<body>

<header>
  <div class="logo">N</div>
  <div class="header-info">
    <h1>NOVA</h1>
    <p>Hinglish AI Assistant · Powered by Gemini</p>
  </div>
  <div class="status-dot"></div>
</header>

<div id="chat">
  <div class="welcome">
    <h2>Namaste! Main hoon NOVA 👋</h2>
    <p>Bol bhai, kya help chahiye? Hinglish mein baat kar!</p>
  </div>

  <div class="suggestions" id="suggestions">
    <button class="suggestion-chip" onclick="sendSuggestion(this)">Mera code explain karo 🧑‍💻</button>
    <button class="suggestion-chip" onclick="sendSuggestion(this)">Aaj ka plan bana do 📅</button>
    <button class="suggestion-chip" onclick="sendSuggestion(this)">Koi joke sunao 😂</button>
    <button class="suggestion-chip" onclick="sendSuggestion(this)">React kya hota hai? ⚛️</button>
  </div>
</div>

<footer>
  <div class="input-wrap">
    <textarea id="userInput" placeholder="Kuch bhi pooch bhai..." rows="1"></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <p class="hint">Enter to send · Shift+Enter for new line</p>
</footer>

<script>
  const GEMINI_API_KEY = 'YOUR_GEMINI_API_KEY';
  const chat = document.getElementById('chat');
  const input = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const history = [];

  const systemPrompt = `You are NOVA, a friendly AI assistant who speaks in Hinglish (Hindi + English mix). 
Rules:
- Always reply in Hinglish — mix Hindi and English naturally
- Be casual, friendly, like a dost (friend)
- Use "bhai", "yaar", "bro" occasionally
- Keep responses concise and helpful
- Use emojis sometimes but not too much
- If asked technical stuff, explain simply in Hinglish
- Never reply in pure Hindi or pure English only`;

  function autoResize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  }

  input.addEventListener('input', autoResize);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function addMsg(role, text) {
    const isUser = role === 'user';
    const div = document.createElement('div');
    div.className = `msg ${isUser ? 'user' : 'bot'}`;
    div.innerHTML = `
      <div class="avatar ${isUser ? 'user-av' : 'bot'}">${isUser ? 'U' : 'N'}</div>
      <div class="bubble">
        <div class="label">${isUser ? 'You' : 'NOVA'}</div>
        ${text}
      </div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typing';
    div.innerHTML = `
      <div class="avatar bot">N</div>
      <div class="bubble typing-bubble">
        <span></span><span></span><span></span>
      </div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    document.getElementById('suggestions')?.remove();

    addMsg('user', text);
    history.push({ role: 'user', parts: [{ text }] });
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            system_instruction: { parts: [{ text: systemPrompt }] },
            contents: history
          })
        }
      );

      const data = await res.json();
      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Bhai kuch gadbad ho gayi, dobara try kar!';
      history.push({ role: 'model', parts: [{ text: reply }] });
      removeTyping();
      addMsg('bot', reply.replace(/\n/g, '<br>'));
    } catch (err) {
      removeTyping();
      addMsg('bot', 'Arre yaar, network issue lag raha hai! Dobara try kar bhai 😅');
    }

    sendBtn.disabled = false;
    input.focus();
  }

  function sendSuggestion(btn) {
    input.value = btn.textContent.replace(/[^\w\s? ]/g, '').trim();
    sendMessage();
  }
</script>
</body>
</html>
